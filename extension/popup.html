<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MindMark</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🔖</span>
            <span class="logo-text">MindMark</span>
        </div>
        <p class="tagline">Your AI bookmark brain</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="save">Save</button>
        <button class="tab" data-tab="bookmarks">Bookmarks</button>
    </div>

    <!-- Save Tab -->
    <div id="tab-save" class="tab-content active">

        <!-- Current page info -->
        <div class="current-page">
            <span class="page-url" id="pageUrl">Loading...</span>
        </div>

        <!-- Editable title -->
        <input
                type="text"
                id="titleInput"
                class="title-input"
                placeholder="Page title..."
        />

        <!-- Note -->
        <textarea
                id="noteInput"
                class="note-input"
                placeholder="Add a note (optional)..."
                rows="2"
        ></textarea>

        <button id="saveBtn" class="btn btn-primary">
            🔖 Save This Page
        </button>
        <div id="saveStatus" class="status-msg"></div>

        <div class="divider"></div>

        <!-- Search -->
        <div class="search-wrapper">
            <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search your bookmarks with AI..."
            />
            <button id="searchBtn" class="btn-search">Search</button>
        </div>
        <div id="searchResults" class="results-container"></div>

    </div>

    <!-- Bookmarks Tab -->
    <div id="tab-bookmarks" class="tab-content">
        <div class="section-header">
            <span class="section-title">Saved Bookmarks</span>
            <button id="refreshBtn" class="btn-icon">↻</button>
        </div>
        <div id="bookmarksList" class="bookmarks-list">
            <p class="empty-msg">Loading bookmarks...</p>
        </div>
    </div>

</div>
<script src="popup.js"></script>
</body>
</html>
